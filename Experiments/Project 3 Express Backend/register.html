<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register </title>
    <Link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header> 
        <div class="logo-container"> 
            <img src="assets/CSI_logo.jpeg" alt="CSI Club Logo" class="logo">
            <h1 class="club-name">CSI Student Chapter</h1> 
        </div> 
        <nav> 
            <ul class="navbar"> 
                <li><a href="index.html">Home</a></li> 
                <li><a href="about.html">About</a></li> 
                <li><a href="events.html">Events</a></li> 
                <li><a href="team.html">Team</a></li> 
                <li><a href="register.html">Register</a></li> 
                <li><a href="contact.html">Contact</a></li> 
            </ul>
        </nav>
    </header>
    <main id="register-page"> 
        <h2>Register with CSI Student Chapter</h2> 

        <form id="register-form" action="/register" method="POST"> 
            <label for="name">Full Name:</label> 
            <input type="text" id="name" name="name" required> 

            <label for="email">Email Address:</label> 
            <input type="email" id="email" name="email" required> 

            <label for="department">Department:</label> 
            <input type="text" id="department" name="department" required> 
            
            <label for="year">Year of Study:</label> 
            <input type="text" id="year" name="year" required> 

            <label for="interest">Area of Interest:</label> 
            <textarea id="interest" name="interest" rows="4" placeholder="e.g., AI/ML, Web Development, Cybersecurity"></textarea> 
            <button type="submit">Submit Registration</button>
        </form> 
    </main>

    <footer>
         <p>&copy; <span id="year"></span> CSI Student Chapter. All rights reserved.</p> 
    </footer>

    <script>
        document.getElementById("register-form").addEventListener("submit", function(e) {
            e.preventDefault(); // stop page reload

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(res => res.text())
            .then(msg => {
                alert(msg); 
                this.reset(); 
            })
            .catch(err => console.error("Error submitting form:", err));
        });
    </script>

</body>
</html>
