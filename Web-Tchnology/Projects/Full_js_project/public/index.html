<!doctype html>
<html>
  <head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>💰 Expense Tracker</h1>

    <h2 id="balance">Balance: ₹0</h2>

    <input type="text" id="text" placeholder="Enter description" />
    <input
      type="number"
      id="amount"
      placeholder="Enter amount (+income / -expense)"
    />

    <br /><br />

    <button id="addBtn">Add Transaction</button>

    <ul id="list"></ul>

    <script src="script.js"></script>
  </body>
</html>
