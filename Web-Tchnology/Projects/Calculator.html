<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
  body {
    font-family: Arial;
    background-color: rgb(0, 0, 0);
  }

  .calculation {
    color: white;
    font-size: 45px;
    margin-top: 15px;
    margin-bottom: 15px;
  }

  .Calculator-button {
    height: 60px;
    width: 60px;
    border-radius: 50px;
    border: none;
    font-size: 26px;
    cursor: pointer;
    margin-right: 5px;
  }

  .grey-button {
    background-color: rgb(51, 51, 51);
    color: white;
  }

  .orange-button {
    background-color: rgb(254, 160, 10);
    color: white;
  }

  .clear-button {
    font-size: 20px;
    font-weight: bolder;
  }
</style>
</head>

<body>

<p class="js-calculation calculation"></p>

<div class="buttons">

  <button class="Calculator-button grey-button" data-value="1">1</button>
  <button class="Calculator-button grey-button" data-value="2">2</button>
  <button class="Calculator-button grey-button" data-value="3">3</button>
  <button class="Calculator-button orange-button" data-value="+">+</button>

  <br><br>

  <button class="Calculator-button grey-button" data-value="4">4</button>
  <button class="Calculator-button grey-button" data-value="5">5</button>
  <button class="Calculator-button grey-button" data-value="6">6</button>
  <button class="Calculator-button orange-button" data-value="-">-</button>

  <br><br>

  <button class="Calculator-button grey-button" data-value="7">7</button>
  <button class="Calculator-button grey-button" data-value="8">8</button>
  <button class="Calculator-button grey-button" data-value="9">9</button>
  <button class="Calculator-button orange-button" data-value="*">*</button>

  <br><br>

  <button class="Calculator-button grey-button" data-value="0">0</button>
  <button class="Calculator-button grey-button" data-value=".">.</button>
  <button class="Calculator-button grey-button equal">=</button>
  <button class="Calculator-button orange-button" data-value="/">/</button>

  <br><br>

  <button class="Calculator-button grey-button clear-button clear">Clear</button>

</div>

<script>

let calculation = localStorage.getItem('calculation') || '';
const display = document.querySelector('.js-calculation');
const buttons = document.querySelector('.buttons');

displayCalculation();

buttons.addEventListener('click', function(event) {

  const target = event.target;

  if (target.dataset.value) {
    calculation += target.dataset.value;
  }

  if (target.classList.contains('equal')) {
    calculation = eval(calculation);
  }

  if (target.classList.contains('clear')) {
    calculation = '';
  }

  displayCalculation();
  localStorage.setItem('calculation', calculation);

});

function displayCalculation() {
  display.innerHTML = calculation;
}

</script>

</body>
</html>
