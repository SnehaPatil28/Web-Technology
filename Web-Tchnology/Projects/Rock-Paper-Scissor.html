<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: white;
        }
        .move-icon{
            height: 50px;
        }
        .move-button{
            width: 120px;
            height: 120px;
            border-radius: 60px;
            border: 2px solid white;
            margin-right: 15px;
            background-color: transparent;
            cursor: pointer;
        }
        .result{
            font-size: 25px;
            font-weight: bold;
            margin-top: 50px;
            
        }
        .score{
            margin-top: 60px;
        }
        .reset-score-button{
            background-color: white;
            font-weight: bold;
            font-size: 15px;
            padding: 8px 15px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <p>
        <button class="move-button" onclick="makeMove('rock')">
            <img class="move-icon" src="https://supersimple.dev/projects/rock-paper-scissors/images/rock-emoji.png">
        </button>
        <button class="move-button" onclick="makeMove('paper')">
            <img class="move-icon" src="https://supersimple.dev/projects/rock-paper-scissors/images/paper-emoji.png">
        </button>
        <button class="move-button" onclick="makeMove('scissors')">
            <img class="move-icon" src="https://supersimple.dev/projects/rock-paper-scissors/images/scissors-emoji.png">
        </button>
    </p>
    <p class="result js-result"></p>
    <p class="js-move-choosen"></p>
    <p class="score js-score">Wins:0 , Losses:0, Ties:0</p>
    <button class="reset-score-button" onclick="resetScore();">
        Reset Score
    </button>
    <script>
         let score ={
            wins : 0,
            Losses : 0,
            Ties : 0
         };

         const savedScore = JSON.parse(localStorage.getItem('score'));
         if(savedScore){
            score = savedScore;
         }

         updateScore();

         function makeMove(playerMove){
            const computerMove = pickComputerMove();
            const resultEle = document.querySelector('.js-result');

            if(playerMove === computerMove){
                resultEle.innerHTML = `Tie`;
                score.Ties += 1;
            } else if(
                (playerMove === 'rock' && computerMove === 'scissors') ||
                (playerMove === 'paper' && computerMove === 'rock') ||
                (playerMove === 'scissors' && computerMove === 'paper')){
                    resultEle.innerHTML = `You win`;
                    score.wins += 1;
                } else{
                    resultEle.innerHTML = `You Loss`;
                    score.Losses += 1;
                }

                const moveEle = document.querySelector('.js-move-choosen');
                moveEle.innerHTML = `
                You
                <img src="https://supersimple.dev/projects/rock-paper-scissors/images/${playerMove}-emoji.png" class="move-icon">
                <img src="https://supersimple.dev/projects/rock-paper-scissors/images/${computerMove}-emoji.png" class="move-icon">
                Computer
                `;

                updateScore();
                localStorage.setItem('score', JSON.stringify(score));

         }

         function resetScore(){
            score = {
                wins : 0,
                Losses : 0,
                Ties : 0
            };
            updateScore();
            localStorage.removeItem('score');
         }

         function pickComputerMove(){
            const randomMove = Math.random();
            let computerMove;

            if(randomMove < 1/3){
                computerMove = 'rock';
            }
            else if(randomMove<2/3 && randomMove>1/3){
                computerMove = 'paper';
            }
            else{
                computerMove = 'scissors';
            }

            return computerMove;
         }

         function updateScore(){
            document.querySelector('.js-score').innerHTML=`
            Wins: ${score.wins} Loss: ${score.Losses} Ties: ${score.Ties}
            `;
         }

         
    </script>
</body>
</html>
