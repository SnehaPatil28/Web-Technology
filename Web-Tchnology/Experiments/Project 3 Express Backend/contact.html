<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header> 
        <div class="logo-container"> 
            <img src="assets/CSI_logo.jpeg" alt="CSI Club Logo" class="logo">
            <h1 class="club-name">CSI Student Chapter</h1> 
        </div> 

        <nav> 
            <ul class="navbar"> 
                <li><a href="index.html">Home</a></li> 
                <li><a href="about.html">About</a></li> 
                <li><a href="events.html">Events</a></li> 
                <li><a href="team.html">Team</a></li> 
                <li><a href="register.html">Register</a></li> 
                <li><a href="contact.html">Contact</a></li> 
            </ul>
        </nav>
    </header>
    <main id="contact-page">
        <h2>Contact Us</h2>

        <form id="contact-form" action="/contact" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject">

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <section class="contact-info">
            <h3>Our Details</h3>
            <p>Email: <a href="mailto:csi@college.edu">csi@college.edu</a></p>
            <p>Phone: +91 98765 43210</p>
            <h3>Connect with us</h3>
            <a href="www.intagram.com">Instagram</a> | 
            <a href="https://in.linkedin.com/company/computer-society-of-india">LinkedIn</a> | 
        </section>

    </main>
    <footer> 
        <p>&copy; <span id="year"></span> CSI Student Chapter. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById("contact-form").addEventListener("submit", function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            fetch("/contact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(res => res.text())
            .then(msg => {
                alert(msg); // popup message
                this.reset(); // clear form
            })
            .catch(err => console.error("Error submitting contact form:", err));
        });
    </script>

</body>
</html>
